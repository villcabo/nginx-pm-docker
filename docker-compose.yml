name: nginx-proxy-manager

networks:
  nginx-pm-network:
    name: nginx-pm-network
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: ${NETWORK_MTU:-1500}
  nginx-pm-router:
    name: nginx-pm-router
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: ${NETWORK_MTU:-1500}

volumes:
  npm-data:
    name: nginx-proxy-manager-data

services:
  npm:
    image: jc21/nginx-proxy-manager:${NPM_VERSION:-2.14.0}
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_ADMIN_PORT:-81}:81"
      - "${NPM_HTTPS_PORT:-443}:443"
    volumes:
      - npm-data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - nginx-pm-network
      - nginx-pm-router
